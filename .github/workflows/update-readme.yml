name: Keep README Updated

on:
  push:
    branches:
      - main
      - master
  pull_request:
    paths:
      - 'frontend/package.json'
      - 'backend/requirements.txt'
      - 'frontend/**'
      - 'backend/**'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Tech Stack Versions
        run: |
          NEXT_VER=$(jq -r '.dependencies.next // .devDependencies.next' frontend/package.json | sed 's/[\^~]//g')
          TAILWIND_VER=$(jq -r '.devDependencies.tailwindcss // .dependencies.tailwindcss' frontend/package.json | sed 's/[\^~]//g')
          FASTAPI_VER=$(grep -i '^fastapi' backend/requirements.txt | head -n 1 | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')

          sed -i -E "s/(<!-- NEXTJS_VERSION_START -->).*(<!-- NEXTJS_VERSION_END -->)/\1$NEXT_VER\2/g" README.md
          sed -i -E "s/(<!-- TAILWIND_VERSION_START -->).*(<!-- TAILWIND_VERSION_END -->)/\1$TAILWIND_VER\2/g" README.md
          sed -i -E "s/(<!-- FASTAPI_VERSION_START -->).*(<!-- FASTAPI_VERSION_END -->)/\1$FASTAPI_VER\2/g" README.md

      - name: Update Project Structure
        run: |
          sudo apt-get install -y tree
          TREE_OUTPUT=$(tree -L 3 -I "node_modules|venv|__pycache__|.git|.next|.ruff_cache" .)
          FORMATTED_TREE="\`\`\`text\n$TREE_OUTPUT\n\`\`\`"
          ESCAPED_TREE=$(echo "$FORMATTED_TREE" | awk '{printf "%s\\n", $0}')
          perl -0777 -pi -e "s/(<!-- PROJECT_STRUCTURE_START -->).*?(<!-- PROJECT_STRUCTURE_END -->)/\$1\n$ESCAPED_TREE\n\$2/s" README.md

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(readme): auto-update versions and project structure"
          file_pattern: "README.md"
